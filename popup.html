<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Revere</title>
    <style>
      :root {
        --bg: #0b0f17;
        --panel: #121826;
        --panel-soft: #171f31;
        --text: #f3f6ff;
        --muted: #94a0ba;
        --line: rgba(148, 160, 186, 0.16);
        --accent: #7c9cff;
        --success: #39d98a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 300px;
        background: var(--bg);
        color: var(--text);
        font-family: "Avenir Next", "Poppins", "Helvetica Neue", sans-serif;
      }

      main {
        padding: 14px;
      }

      .shell {
        display: grid;
        gap: 12px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
        letter-spacing: -0.03em;
      }

      h2 {
        font-size: 13px;
      }

      .badge {
        padding: 7px 9px;
        border-radius: 999px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .badge.live {
        color: var(--success);
      }

      .meta {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
      }

      .meta-label {
        color: var(--muted);
      }

      .meta-value {
        color: var(--text);
        text-align: right;
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 11px 12px;
        cursor: pointer;
        font: inherit;
      }

      .primary {
        background: var(--accent);
        color: #08101f;
        font-weight: 700;
      }

      .secondary {
        background: var(--panel-soft);
        border: 1px solid var(--line);
        color: var(--text);
      }

      .sub {
        margin-top: 4px;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .events {
        display: grid;
        gap: 8px;
      }

      .event-card,
      .empty {
        padding: 10px 12px;
        border-radius: 12px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
      }

      .event-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 4px;
        font-size: 11px;
        color: var(--muted);
      }

      .event-summary,
      .empty {
        font-size: 12px;
        line-height: 1.45;
      }

      .empty {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <section class="card">
          <div class="header">
            <h1>Revere</h1>
            <div class="badge" id="monitor-badge">Not Monitoring</div>
          </div>

          <div class="meta">
            <div class="meta-row">
              <span class="meta-label">Site</span>
              <span class="meta-value" id="tab-domain">Current tab</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Last Alert</span>
              <span class="meta-value" id="last-stat">None</span>
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="toggle">Loading...</button>
            <button class="secondary" id="test">Send Test Notification</button>
            <button class="secondary" id="open-options">Open Dashboard</button>
          </div>
        </section>

        <section class="card">
          <h2>Recents</h2>
          <p class="sub">Latest alerts only.</p>
          <div class="events" id="events"></div>
        </section>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Revere</title>
    <style>
      :root {
        --bg: #0b0f17;
        --panel: #121826;
        --panel-soft: #171f31;
        --text: #f3f6ff;
        --muted: #94a0ba;
        --line: rgba(148, 160, 186, 0.18);
        --accent: #7c9cff;
        --accent-strong: #5d80ff;
        --success: #39d98a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 340px;
        background: var(--bg);
        color: var(--text);
        font-family: "Avenir Next", "Poppins", "Helvetica Neue", sans-serif;
      }

      main {
        padding: 16px;
      }

      .shell {
        display: grid;
        gap: 12px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 22px;
        letter-spacing: -0.03em;
      }

      h2 {
        font-size: 14px;
      }

      .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .badge {
        padding: 8px 10px;
        border-radius: 999px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #4e5972;
      }

      .dot.live {
        background: var(--success);
      }

      .meta {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
      }

      .meta-label {
        color: var(--muted);
      }

      .meta-value {
        color: var(--text);
        text-align: right;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      input,
      select,
      button {
        font: inherit;
      }

      input,
      select {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--text);
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 11px 12px;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #08101f;
        font-weight: 700;
      }

      .secondary {
        background: var(--panel-soft);
        border: 1px solid var(--line);
        color: var(--text);
      }

      .events {
        display: grid;
        gap: 8px;
      }

      .event {
        padding: 10px 12px;
        border-radius: 12px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
      }

      .event-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 4px;
        font-size: 11px;
        color: var(--muted);
      }

      .event-summary {
        font-size: 12px;
        line-height: 1.45;
        color: var(--text);
      }

      .empty {
        padding: 12px;
        border-radius: 12px;
        border: 1px dashed var(--line);
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <section class="card">
          <div class="header">
            <div>
              <h1>Revere</h1>
              <p class="sub">Watch one tab. Get the alert.</p>
            </div>
            <div class="badge" id="phone-status">Phone Off</div>
          </div>
          <div class="status">
            <span class="dot" id="status-dot"></span>
            <span id="status">Checking tab state...</span>
          </div>
          <div class="meta">
            <div class="meta-row">
              <span class="meta-label">Site</span>
              <span class="meta-value" id="tab-domain">Current tab</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Mode</span>
              <span class="meta-value" id="mode-stat">Page</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Last Alert</span>
              <span class="meta-value" id="last-stat">None</span>
            </div>
          </div>
          <label>
            Watch name
            <input id="watch-name" type="text" placeholder="BTC on Coinbase">
          </label>
          <label>
            Detection mode
            <select id="watch-mode">
              <option value="price">Price Changes</option>
              <option value="live">Live Feed</option>
              <option value="page">Page Changes</option>
            </select>
          </label>
          <div class="actions">
            <button class="primary" id="toggle">Loading...</button>
            <button class="secondary" id="test">Send Test Notification</button>
            <button class="secondary" id="open-options">Open Dashboard</button>
          </div>
        </section>

        <section class="card">
          <h2>Recent</h2>
          <p class="sub" style="margin-bottom:12px;">Latest signals only.</p>
          <div class="events" id="events"></div>
        </section>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>

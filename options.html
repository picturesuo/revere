<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Revere Options</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        max-width: 720px;
        padding: 24px;
      }

      h1 {
        margin-top: 0;
      }

      label,
      input {
        display: block;
        width: 100%;
      }

      input[type="url"] {
        margin: 8px 0 16px;
        padding: 10px;
      }

      .row {
        margin-bottom: 16px;
      }

      button {
        padding: 10px 14px;
      }

      #message {
        margin-top: 12px;
        color: #444;
      }
    </style>
  </head>
  <body>
    <h1>Revere Options</h1>
    <div class="row">
      <label for="webhook-url">Webhook URL</label>
      <input id="webhook-url" type="url" placeholder="https://example.com/webhook">
    </div>
    <div class="row">
      <label for="ntfy-server">ntfy server</label>
      <input id="ntfy-server" type="url" placeholder="https://ntfy.sh">
    </div>
    <div class="row">
      <label for="subscription-name">ntfy topic name</label>
      <input id="subscription-name" type="text" placeholder="your-private-topic-name">
    </div>
    <div class="row">
      <label>
        <input id="notifications-enabled" type="checkbox">
        Enable Chrome notifications
      </label>
    </div>
    <p>When you save an `ntfy` topic here, the extension sends phone pushes directly to that topic. The webhook stays optional for custom bridges.</p>
    <button id="save">Save</button>
    <p id="message"></p>
    <script src="options.js"></script>
  </body>
</html>
